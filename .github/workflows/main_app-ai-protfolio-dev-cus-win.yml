name: Build and deploy Node.js app to Azure Web App - app-ai-protfolio-dev-cus-win

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies and build
        working-directory: ./frontend
        run: |
          npm ci        # faster & clean install
          npm run build # actually build the project

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./frontend/build   # upload built output only

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./build   # downloads artifact into ./build folder

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-ai-protfolio-dev-cus-win'
          package: ./build  # now ./build actually exists
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_02C31BB1E9B2496EAFDC271BD4B57F3C }}
