name: Build and deploy Node.js app to Azure Web App - app-ai-protfolio-dev-cus

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      # Install and build React app inside frontend
      - name: npm install, build, and test
        working-directory: ./frontend
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      # Upload only the build folder for deployment (best practice for React)
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: ./frontend/build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: react-build

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-ai-protfolio-dev-cus'
          slot-name: 'Production'
          package: ./build   # Deploy the build folder downloaded above
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_86CCCFCEBE4B4952872BDFF1FE74AFFE }}
