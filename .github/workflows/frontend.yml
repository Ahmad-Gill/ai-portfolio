name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"

jobs:
  frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Ubuntu Packages
        run: sudo apt-get update

      - name: Install Required Packages
        run: |
          sudo apt-get install -y \
            nginx \
            git \
            curl \
            wget \
            unzip \
            zip \
            python3 \
            python3-pip \
            python3-venv \
            build-essential \
            ca-certificates \
            rsync

      - name: Display Installed Versions
        run: |
          git --version
          node --version || true
          npm --version || true
          python3 --version
          pip3 --version
          nginx -v
          rsync --version | head -n 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Verify Node Installation
        run: |
          node --version
          npm --version

      - name: Install Dependencies
        run: npm ci

      - name: Build React Application
        run: npm run build

      - name: Verify Build Output
        run: |
          ls -la
          ls -la build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p ${{ secrets.AWS_PORT }} ${{ secrets.AWS_HOST }} >> ~/.ssh/known_hosts

      - name: Create Frontend Directory on Server
        run: |
          ssh -p ${{ secrets.AWS_PORT }} \
          ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} \
          "mkdir -p /var/www/frontend"

      - name: Sync Frontend Files
        run: |
          rsync -azv \
            --delete \
            -e "ssh -p ${{ secrets.AWS_PORT }}" \
            ./ \
            ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }}:/var/www/frontend/

      - name: Deployment Complete
        run: echo "✅ Frontend deployed successfully."