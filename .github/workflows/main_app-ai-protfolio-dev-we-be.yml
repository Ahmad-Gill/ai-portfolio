name: Deploy Django backend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      COQUI_TOS_AGREED: ${{ secrets.COQUI_TOS_AGREED }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Verify FFmpeg
        run: |
          ffmpeg -version
          ffprobe -version

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Collect static files
        working-directory: ./backend
        env:
          COQUI_TOS_AGREED: ${{ secrets.COQUI_TOS_AGREED }}
        run: python manage.py collectstatic --noinput

      - name: Create deployment package
        run: |
          cd backend
          zip -r ../django-backend.zip .

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: django-backend
          path: django-backend.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    env:
      COQUI_TOS_AGREED: ${{ secrets.COQUI_TOS_AGREED }}

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: django-backend
          path: .

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure Oryx build on App Service
        run: |
          az webapp config appsettings set \
            --name app-ai-protfolio-dev-we-be \
            --resource-group ASIA-AGRO-SILAGE \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true ENABLE_ORYX_BUILD=true

      - uses: azure/webapps-deploy@v3
        with:
          app-name: app-ai-protfolio-dev-we-be
          package: ./django-backend.zip
          clean: true