name: Build and deploy React app to Azure Web App - app-ai-protfolio-dev-cus

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      # Install and build React app inside frontend
      - name: Install dependencies and build
        working-directory: ./frontend
        run: |
          npm install
          CI=false npm run build  # disables test failures in CI

      # Upload only the build folder for deployment
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: react-build        # This matches your artifact name
          path: ./frontend/build   # Only upload build folder

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: react-build         # Same name as uploaded above
          path: ./build             # Put downloaded files into ./build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-ai-protfolio-dev-cus'
          slot-name: 'Production'
          package: ./build           # This is where we downloaded it
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_86CCCFCEBE4B4952872BDFF1FE74AFFE }}
