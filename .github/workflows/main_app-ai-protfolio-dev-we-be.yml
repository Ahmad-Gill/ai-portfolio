name: Deploy Django backend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect static files
        working-directory: ./backend
        run: |
          python manage.py collectstatic --noinput

      # 🔹 Zip the backend so Azure deploys from a single file
      - name: Create deployment package
        run: |
          cd backend
          zip -r ../django-backend.zip .

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: django-backend
          path: django-backend.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: django-backend
          path: .

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-ai-protfolio-dev-we-be'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BE }}
          package: django-backend.zip

