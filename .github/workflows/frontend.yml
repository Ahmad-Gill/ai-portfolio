name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

  pull_request:
    branches:
      - main
    paths:
      - "frontend/**"

jobs:
  frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Verify Node Installation
        run: |
          node --version
          npm --version

      - name: Install Dependencies
        run: npm ci

      - name: Build React Application
        run: npm run build

      - name: Verify Build Output
        run: |
          pwd
          ls -la
          ls -la build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p ${{ secrets.AWS_PORT }} ${{ secrets.AWS_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          ssh -p ${{ secrets.AWS_PORT }} \
            ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} \
            "echo 'Connected successfully'; whoami; pwd"

      - name: Create Frontend Directory
        run: |
          ssh -p ${{ secrets.AWS_PORT }} \
            ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} \
            "mkdir -p ~/frontend"

      - name: Deploy Frontend Build
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.AWS_PORT }}" \
            build/ \
            ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }}:~/frontend/

      - name: Verify Deployment
        run: |
          ssh -p ${{ secrets.AWS_PORT }} \
            ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} \
            "ls -lah ~/frontend"

      - name: Deployment Complete
        run: echo "✅ Frontend deployed successfully to ~/frontend"