name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          echo "Connected Successfully"
          hostname
          whoami
          pwd
          EOF

      - name: Install Required Packages on EC2
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          sudo apt-get update

          sudo apt-get install -y \
          python3 \
          python3-pip \
          python3-venv \
          python3-dev \
          build-essential \
          nginx \
          git \
          unzip \
          rsync

          python3 --version
          pip3 --version

          EOF

      - name: Create Backend Folder
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          mkdir -p ~/backend

          EOF

      - name: Deploy Backend Files
        run: |
          rsync -avz --delete \
          --exclude '.git' \
          --exclude '__pycache__' \
          --exclude '*.pyc' \
          --exclude 'venv' \
          --exclude '.venv' \
          --exclude '.github' \
          -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
          ./ \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/backend/

      - name: Setup Python Virtual Environment
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          cd ~/backend

          if [ ! -d venv ]; then
              python3 -m venv venv
          fi

          source venv/bin/activate

          python -m pip install --upgrade pip wheel setuptools

          pip install gunicorn

          pip install -r requirements.txt

          python manage.py migrate --noinput

          python manage.py collectstatic --noinput

          deactivate

          EOF

      - name: Create Gunicorn Systemd Service
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          sudo tee /etc/systemd/system/gunicorn.service > /dev/null << 'SERVICE'
          [Unit]
          Description=Gunicorn Django Service
          After=network.target

          [Service]
          User=${{ secrets.EC2_USER }}
          Group=www-data

          WorkingDirectory=/home/${{ secrets.EC2_USER }}/backend

          Environment="PATH=/home/${{ secrets.EC2_USER }}/backend/venv/bin"

          ExecStart=/home/${{ secrets.EC2_USER }}/backend/venv/bin/gunicorn \
          ai_portfolio.wsgi:application \
          --workers 3 \
          --bind unix:/home/${{ secrets.EC2_USER }}/backend/gunicorn.sock \
          --access-logfile - \
          --error-logfile -

          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          SERVICE

          sudo systemctl daemon-reload
          sudo systemctl enable gunicorn

          EOF

      - name: Start Gunicorn
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          sudo systemctl restart gunicorn

          sleep 5

          sudo systemctl status gunicorn --no-pager

          EOF

      - name: Verify Gunicorn Socket
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          ls -lah ~/backend

          if [ -S ~/backend/gunicorn.sock ]; then
              echo "Gunicorn socket created successfully."
          else
              echo "Gunicorn socket not found."
              sudo journalctl -u gunicorn -n 100 --no-pager
              exit 1
          fi

          EOF

      - name: Create Static Directory
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          mkdir -p ~/backend/staticfiles

          EOF

      # NOTE: this writes a *separate* Nginx server block for the backend.
      # Since your frontend is already deployed on the same EC2 instance
      # (likely also served by Nginx on port 80), a second "server_name _;"
      # catch-all block here can conflict with / override your frontend's
      # Nginx config. This version assumes you want the API reachable at
      # /api/ on the SAME server your frontend already uses, and reverse
      # proxies that path to Gunicorn, leaving "/" for the frontend.
      # If your frontend has its own separate Nginx site file, tell me
      # and I'll adjust this to add a location block into that file instead
      # of creating a new server block.
      - name: Configure Nginx
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          sudo tee /etc/nginx/sites-available/backend > /dev/null << 'NGINX'
          server {
              listen 80;
              server_name _;

              client_max_body_size 100M;

              location /static/ {
                  alias /home/${{ secrets.EC2_USER }}/backend/staticfiles/;
              }

              location /media/ {
                  alias /home/${{ secrets.EC2_USER }}/backend/media/;
              }

              location /api/ {
                  include proxy_params;
                  proxy_pass http://unix:/home/${{ secrets.EC2_USER }}/backend/gunicorn.sock;
              }
          }
          NGINX

          sudo rm -f /etc/nginx/sites-enabled/default

          sudo ln -sf \
          /etc/nginx/sites-available/backend \
          /etc/nginx/sites-enabled/backend

          sudo nginx -t

          sudo systemctl enable nginx
          sudo systemctl restart nginx

          EOF

      - name: Verify Nginx
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          echo "===== Nginx Status ====="
          sudo systemctl status nginx --no-pager

          echo ""

          echo "===== Listening Ports ====="
          sudo ss -tulpn

          echo ""

          echo "===== Enabled Sites ====="
          ls -lah /etc/nginx/sites-enabled

          EOF

      - name: Verify Gunicorn
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          echo "===== Gunicorn Status ====="

          sudo systemctl status gunicorn --no-pager

          echo ""

          echo "===== Gunicorn Logs ====="

          sudo journalctl -u gunicorn -n 50 --no-pager

          EOF

      - name: Check Django Files
        run: |
          ssh -o StrictHostKeyChecking=no \
          -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          cd ~/backend

          echo "===== Backend Files ====="

          ls -lah

          echo ""

          echo "===== Django Project ====="

          ls -lah ai_portfolio

          EOF